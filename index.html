<title>Fleet Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #d8e0e8;
    --panel: #e8edf3;
    --panel2: #dce4ec;
    --border: #b0c0d0;
    --accent: #0066cc;
    --accent2: #0044aa;
    --warn: #cc7700;
    --danger: #cc1122;
    --ok: #007744;
    --text: #0a1628;
    --muted: #5a7090;
    --dim: #b0c4d8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; font-weight: 700; }
  body {
    background: var(--bg);
    font-family: 'IBM Plex Sans', sans-serif;
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 40% at 50% -10%, rgba(0,100,200,0.05) 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(180,200,220,0.4) 39px, rgba(180,200,220,0.4) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(180,200,220,0.2) 39px, rgba(180,200,220,0.2) 40px);
  }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 36px;
    border-bottom: 1px solid var(--border);
    background: rgba(8,12,20,0.9);
    backdrop-filter: blur(10px);
    position: sticky; top: 0; z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    clip-path: polygon(20% 0%, 100% 0%, 80% 100%, 0% 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .logo-text { font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 3px; color: var(--accent); }
  .logo-sub { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 2px; }
  .clock { font-family: 'IBM Plex Mono', monospace; font-size: 20px; font-weight: 300; color: var(--accent); letter-spacing: 2px; }
  .date-line { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); text-align: right; letter-spacing: 1px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ok); box-shadow: 0 0 8px var(--ok); animation: pulse 2s infinite; }
  .header-right { display: flex; align-items: center; gap: 14px; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }

  .summary-bar { display: flex; gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
  .summary-item { flex:1; padding: 14px 20px; background: var(--panel); display: flex; align-items: center; gap: 12px; }
  .summary-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); display: block; }
  .summary-value { font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 700; line-height: 1; }
  .summary-icon { font-size: 22px; opacity: 0.7; }
  .c-ok { color: var(--ok); } .c-warn { color: var(--warn); } .c-danger { color: var(--danger); } .c-accent { color: var(--accent); }

  .main { display: flex; height: calc(100vh - 130px); }
  .sidebar { width: 205px; min-width: 205px; border-right: 1px solid var(--border); background: var(--panel); overflow-y: auto; padding: 16px 0; }
  .sidebar-title { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); padding: 0 16px 12px; }
  .sidebar-group-title { font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); padding: 14px 16px 6px; border-top: 1px solid var(--border); margin-top: 4px; }
  .aircraft-tab { padding: 11px 16px; cursor: pointer; border-left: 3px solid transparent; transition: all 0.15s; position: relative; }
  .aircraft-tab:hover { background: var(--panel2); }
  .aircraft-tab.active { background: var(--panel2); border-left-color: var(--accent); }
  .tab-reg { font-family: 'Orbitron', sans-serif; font-size: 11px; font-weight: 700; color: var(--text); letter-spacing: 1px; }
  .aircraft-tab.active .tab-reg { color: var(--accent); }
  .tab-model { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--muted); margin-top: 2px; }
  .tab-badge { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); width: 8px; height: 8px; border-radius: 50%; }
  .badge-ok { background: var(--ok); box-shadow: 0 0 6px var(--ok); }
  .badge-warn { background: var(--warn); box-shadow: 0 0 6px var(--warn); }
  .badge-danger { background: var(--danger); box-shadow: 0 0 6px var(--danger); }
  .badge-empty { background: var(--dim); }

  .content { flex:1; overflow-y: auto; padding: 28px 32px; }
  .aircraft-panel { display: none; animation: fadeIn 0.2s ease; }
  .aircraft-panel.active { display: block; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none} }

  .aircraft-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; }
  .aircraft-reg { font-family: 'Orbitron', sans-serif; font-size: 34px; font-weight: 900; letter-spacing: 2px; color: var(--accent); line-height: 1; }
  .aircraft-model-line { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted); letter-spacing: 2px; margin-top: 4px; }

  .status-select-wrap { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .status-select {
    background: var(--panel2); border: 1px solid var(--border); color: var(--text);
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 2px;
    padding: 6px 14px; border-radius: 2px; cursor: pointer; outline: none;
    text-transform: uppercase;
  }
  .status-select:focus { border-color: var(--accent); }

  .divider-label {
    font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--muted); margin: 20px 0 14px; display: flex; align-items: center; gap: 12px;
  }
  .divider-label::after { content:''; flex:1; height:1px; background: var(--border); }

  .section-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .section-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }

  .card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 20px; position: relative; overflow: hidden;
  }
  .card::before { content:''; position: absolute; top:0; left:0; right:0; height:1px; background: linear-gradient(90deg, transparent, var(--accent2), transparent); opacity:0.4; }
  .card-title { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

  /* Editable fields */
  .field-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 8px; }
  .field-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); white-space: nowrap; }
  .field-input {
    background: var(--panel2); border: 1px solid var(--dim); border-radius: 2px;
    color: var(--text); font-family: 'Orbitron', monospace; font-size: 14px; font-weight: 700;
    padding: 4px 8px; width: 120px; text-align: right; outline: none;
    transition: border-color 0.15s;
  }
  .field-input:focus { border-color: var(--accent); }
  .field-input::placeholder { color: var(--dim); font-size: 11px; font-family: 'IBM Plex Mono', monospace; font-weight: 400; }
  .field-unit { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--muted); min-width: 22px; }

  .progress-bar { height: 4px; background: var(--dim); border-radius: 2px; overflow: hidden; margin-top: 6px; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
  .fill-ok { background: linear-gradient(90deg, var(--ok), #00b380); }
  .fill-warn { background: linear-gradient(90deg, var(--warn), #cc8800); }
  .fill-danger { background: linear-gradient(90deg, var(--danger), #cc2233); }
  .fill-empty { background: var(--dim); }
  .pct-line { display: flex; justify-content: space-between; margin-top: 5px; }
  .pct-text { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--muted); }

  /* Maintenance rows */
  .maint-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .maint-row:last-child { border-bottom: none; }
  .maint-input {
    background: var(--panel2); border: 1px solid var(--dim); border-radius: 2px;
    color: var(--text); font-family: 'IBM Plex Sans', sans-serif; font-size: 11px;
    padding: 5px 8px; outline: none; transition: border-color 0.15s; width: 100%;
  }
  .maint-input:focus { border-color: var(--accent); }
  .maint-input::placeholder { color: var(--dim); }
  .maint-date { font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
  .days-badge {
    font-family: 'Orbitron', monospace; font-size: 10px; font-weight: 700;
    padding: 3px 8px; border-radius: 2px; white-space: nowrap; min-width: 44px; text-align: center;
  }
  .days-ok { background: rgba(0,229,153,0.1); color: var(--ok); }
  .days-warn { background: rgba(255,170,0,0.1); color: var(--warn); }
  .days-danger { background: rgba(255,68,85,0.1); color: var(--danger); }
  .days-empty { background: var(--dim); color: var(--muted); }

  /* Doc rows */
  .doc-row { display: grid; grid-template-columns: 1fr 160px 110px; gap: 8px; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); } .doc-row > *:last-child { text-align: right; min-width: 110px; }
  .doc-row:last-child { border-bottom: none; }
  .doc-name-input {
    background: transparent; border: none; border-bottom: 1px solid var(--dim);
    color: var(--text); font-family: 'IBM Plex Sans', sans-serif; font-size: 11px;
    padding: 3px 0; outline: none; width: 100%;
  }
  .doc-name-input:focus { border-bottom-color: var(--accent); }
  .doc-date-input {
    background: var(--panel2); border: 1px solid var(--dim); border-radius: 2px;
    color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    padding: 4px 6px; outline: none; width: 100%;
  }
  .doc-date-input:focus { border-color: var(--accent); }
  .doc-status-sel {
    background: var(--panel2); border: 1px solid var(--dim);
    color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 9px;
    padding: 4px 6px; border-radius: 2px; cursor: pointer; outline: none;
    letter-spacing: 1px;
  }
  .add-row-btn {
    margin-top: 10px; padding: 5px 12px;
    background: transparent; border: 1px dashed var(--dim);
    color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    letter-spacing: 1px; cursor: pointer; border-radius: 2px; width: 100%;
    transition: all 0.15s;
  }
  .add-row-btn:hover { border-color: var(--accent); color: var(--accent); }

  .save-btn {
    margin-top: 24px; padding: 10px 24px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border: none; border-radius: 2px;
    color: #000; font-family: 'Orbitron', sans-serif; font-size: 11px;
    font-weight: 700; letter-spacing: 2px; cursor: pointer;
    transition: opacity 0.15s;
  }
  .save-btn:hover { opacity: 0.85; }
  .save-msg { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--ok); margin-left: 12px; opacity: 0; transition: opacity 0.3s; }

  /* Gauge */
  .gauge-wrap { display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 6px; padding: 6px 0; }
  .gauge-svg { width: 120px; height: 70px; }
  .gauge-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--muted); text-align: center; }
  .gauge-val { font-family: 'Orbitron', monospace; font-size: 14px; font-weight: 700; text-align: center; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

  input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.5); cursor: pointer; }

  /* Equipos de Emergencia */
  .emerg-section { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 10px; }
  .emerg-title {
    font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--accent2); margin-bottom: 8px;
    display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none;
  }
  .emerg-title:hover { color: var(--accent); }
  .emerg-body { display: block; }
  .emerg-row { display: grid; grid-template-columns: 1fr 160px 110px; gap: 8px; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .emerg-row:last-child { border-bottom: none; }
  .emerg-label { font-family: 'IBM Plex Sans', sans-serif; font-size: 11px; font-weight: 700; color: var(--text); }

  /* ===== MOBILE RESPONSIVE ===== */
  @media (max-width: 768px) {
    .summary-bar { flex-wrap: wrap; }
    .summary-item { flex: 1 1 45%; padding: 10px 12px; }
    .summary-value { font-size: 18px; }

    .main { flex-direction: column; height: auto; }

    .sidebar {
      width: 100% !important;
      min-width: 100% !important;
      border-right: none;
      border-bottom: 1px solid var(--border);
      padding: 8px 0;
      display: flex;
      flex-direction: row;
      overflow-x: auto;
      overflow-y: hidden;
      white-space: nowrap;
      max-height: none;
      height: auto;
    }
    .sidebar-title { display: none; }
    .sidebar-group-title { display: none; }
    .aircraft-tab {
      display: inline-block;
      padding: 8px 12px;
      border-left: none;
      border-bottom: 3px solid transparent;
      white-space: nowrap;
      min-width: auto;
    }
    .aircraft-tab.active {
      border-left: none;
      border-bottom-color: var(--accent);
    }
    .tab-model { display: none; }
    .tab-badge { position: static; transform: none; display: inline-block; margin-left: 4px; }

    .content { padding: 12px; }

    .aircraft-header { flex-direction: column; gap: 10px; }
    .aircraft-reg { font-size: 22px; }

    .section-grid { grid-template-columns: 1fr; }
    .section-grid-2 { grid-template-columns: 1fr; }

    .maint-row { grid-template-columns: 1fr 1fr auto; }
    .doc-row { grid-template-columns: 1fr auto auto; }
    .emerg-row { grid-template-columns: 1fr auto; }

    .header { padding: 8px 12px; }
    .logo-text { font-size: 10px; }
    .clock { font-size: 13px; }
  }

  @media (max-width: 480px) {
    .summary-item { flex: 1 1 100%; }
    .aircraft-reg { font-size: 18px; }
  }
</style>

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  if (isNaN(d)) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.round((d - today) / 86400000);
}
function daysBadge(days) {
  if (days === null) return '<span class="days-badge days-empty">—</span>';
  if (days < 0) return `<span class="days-badge days-danger">VENC</span>`;
  if (days <= 7) return `<span class="days-badge days-danger">${days}d</span>`;
  if (days <= 30) return `<span class="days-badge days-warn">${days}d</span>`;
  return `<span class="days-badge days-ok">${days}d</span>`;
}
function pct(v, l) {
  const n = parseFloat(v), lim = parseFloat(l);
  if (!n || !lim) return null;
  return Math.min(100, Math.round(n / lim * 100));
}
// Vencimiento bar helpers (shows remaining hours, green < 70% used, red >= 70%)
function updateHorasWarning(input, limit) {
  const pct = parseFloat(input.value || 0) / limit * 100;
  if (pct >= 80) {
    input.style.background = 'rgba(204,17,34,0.12)';
    input.style.borderColor = 'var(--danger)';
  } else {
    input.style.background = '';
    input.style.borderColor = '';
  }
}

function setFechaHoy(elemId) {
  const el = document.getElementById(elemId);
  if (el) el.textContent = new Date().toLocaleDateString('es-PA', {day:'2-digit',month:'2-digit',year:'numeric'});
}

function vencBarPct(hv, limit) {
  const v = parseFloat(hv), l = parseFloat(limit) || 2000;
  if (!v) return 0; // empty bar if no data
  return Math.min(100, Math.round(v / l * 100)); // shows USED %
}
function vencBarCls(hv, limit) {
  const v = parseFloat(hv), l = parseFloat(limit) || 2000;
  if (!v) return 'fill-ok';
  const remaining = (l - v) / l * 100; // % remaining
  return remaining <= 20 ? 'fill-danger' : 'fill-ok';
}
function vencBarLabel(hv, limit) {
  const v = parseFloat(hv), l = parseFloat(limit) || 2000;
  if (!v) return '—';
  const rem = (l - v).toFixed(1);
  const used = Math.round(v / l * 100);
  return parseFloat(rem) > 0 ? `Quedan ${rem} HV (${100-used}%)` : 'VENCIDO';
}
function updateVencBar(tipo, idx, val, limit) {
  const pbId = tipo === 'motor' ? 'pb-motor-' : 'pb-helices-';
  const pctId = tipo === 'motor' ? 'pct-motor-' : 'pct-helices-';
  const pb = document.getElementById(pbId + idx);
  const pct = document.getElementById(pctId + idx);
  if (pb) { pb.style.width = vencBarPct(val, limit) + '%'; pb.className = 'progress-fill ' + vencBarCls(val, limit); }
  if (pct) pct.textContent = vencBarLabel(val, limit);
}

function fillCls(p) {
  if (p === null) return 'fill-empty';
  if (p >= 90) return 'fill-danger';
  if (p >= 70) return 'fill-warn';
  return 'fill-ok';
}
function buildGauge(val, max, color) {
  const v = parseFloat(val), m = parseFloat(max);
  if (!v || !m) return `<svg class="gauge-svg" viewBox="0 0 120 70"><path d="M 5 65 A 55 55 0 0 1 115 65" fill="none" stroke="#243550" stroke-width="10" stroke-linecap="round"/></svg>`;
  const p = Math.min(1, v / m);
  const r=55, cx=60, cy=65;
  const x2 = cx + r * Math.cos(Math.PI + p * Math.PI);
  const y2 = cy + r * Math.sin(Math.PI + p * Math.PI);
  const lg = p > 0.5 ? 1 : 0;
  return `<svg class="gauge-svg" viewBox="0 0 120 70">
    <path d="M 5 65 A 55 55 0 0 1 115 65" fill="none" stroke="#243550" stroke-width="10" stroke-linecap="round"/>
    <path d="M 5 65 A 55 55 0 ${lg} 1 ${x2} ${y2}" fill="none" stroke="${color}" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
  </svg>`;
}
function gaugeColor(v, m) {
  const p = parseFloat(v) / parseFloat(m);
  if (!p || isNaN(p)) return '#243550';
  if (p >= 0.85) return '#ff4455';
  if (p >= 0.6) return '#ffaa00';
  return '#00e599';
}

function diasTranscurridos(fechaStr) {
  if (!fechaStr) return null;
  const d = new Date(fechaStr);
  if (isNaN(d)) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.round((today - d) / 86400000);
}

function estadoPiezaBadge(estado) {
  if (estado === 'disponible') return '<span style="font-family:IBM Plex Mono,monospace;font-size:8px;padding:1px 6px;border-radius:2px;background:rgba(0,102,204,0.1);color:var(--accent)">DISPONIBLE</span>';
  if (estado === 'pedida') return '<span style="font-family:IBM Plex Mono,monospace;font-size:8px;padding:1px 6px;border-radius:2px;background:rgba(204,119,0,0.1);color:var(--warn)">PEDIDA</span>';
  if (estado === 'recibida') return '<span style="font-family:IBM Plex Mono,monospace;font-size:8px;padding:1px 6px;border-radius:2px;background:rgba(0,119,68,0.1);color:var(--ok)">RECIBIDA</span>';
  return '<span style="font-family:IBM Plex Mono,monospace;font-size:8px;padding:1px 6px;border-radius:2px;background:var(--dim);color:var(--muted)">PENDIENTE</span>';
}

function renderMaintList(idx, items) {
  const container = document.getElementById('maint-list-' + idx);
  if (!container) return;
  container.innerHTML = '';
  if (!items || !items.length) return;
  items.forEach((m, mi) => {
    if (m.resuelto) return; // skip resolved tasks
    const dias = diasTranscurridos(m.fecha);
    const piezas = Array.isArray(m.piezas) ? m.piezas : [];
    const wrap = document.createElement('div');
    wrap.style = 'border-bottom:1px solid var(--border);padding:10px 0';
    wrap.id = 'maint-wrap-' + idx + '-' + mi;

    // Main row
    const mainRow = document.createElement('div');
    mainRow.style = 'display:grid;grid-template-columns:1fr 150px 60px auto auto;gap:8px;align-items:center;margin-bottom:6px';
    mainRow.innerHTML = `
      <input type="text" class="maint-input" placeholder="Tarea de mantenimiento" value="${m.nombre||''}" onchange="updateMaint(${idx},${mi},'nombre',this.value)">
      <input type="date" class="maint-input" value="${m.fecha||''}" onchange="updateMaint(${idx},${mi},'fecha',this.value);renderMaintList(${idx},state[${idx}].mantenimiento)">
      <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--accent);font-weight:700;text-align:center">${dias !== null ? dias + 'd' : '—'}</span>
      <button onclick="togglePiezas(${idx},${mi})" style="font-family:'IBM Plex Mono',monospace;font-size:8px;background:transparent;border:1px solid var(--border);border-radius:2px;padding:2px 7px;cursor:pointer;color:var(--muted)">🔩 Piezas</button>
      <button onclick="resolverTarea(${idx},${mi})" style="font-family:'IBM Plex Mono',monospace;font-size:8px;background:rgba(0,119,68,0.1);border:1px solid var(--ok);border-radius:2px;padding:2px 7px;cursor:pointer;color:var(--ok)">✓ Resuelto</button>
    `;
    wrap.appendChild(mainRow);

    // Piezas section
    const piezasDiv = document.createElement('div');
    piezasDiv.id = 'piezas-' + idx + '-' + mi;
    piezasDiv.style = 'display:none;margin-left:12px;margin-top:4px';

    piezas.forEach((p, pi) => {
      const pRow = document.createElement('div');
      pRow.style = 'display:grid;grid-template-columns:1fr 100px auto;gap:6px;align-items:center;padding:4px 0;border-bottom:1px solid var(--dim)';
      pRow.innerHTML = `
        <input type="text" class="maint-input" placeholder="Nombre de la pieza" value="${p.nombre||''}" style="font-size:10px" onchange="updatePieza(${idx},${mi},${pi},'nombre',this.value)">
        <select onchange="updatePieza(${idx},${mi},${pi},'estado',this.value)" style="font-family:'IBM Plex Mono',monospace;font-size:9px;padding:3px 6px;border:1px solid var(--border);border-radius:2px;background:var(--panel2);color:var(--text)">
          <option value="disponible" ${(p.estado||'disponible')==='disponible'?'selected':''}>Disponible</option>
          <option value="pedida" ${p.estado==='pedida'?'selected':''}>Pedida</option>
          <option value="recibida" ${p.estado==='recibida'?'selected':''}>Recibida</option>
        </select>
        <button onclick="removePieza(${idx},${mi},${pi})" style="background:transparent;border:none;color:var(--danger);cursor:pointer;font-size:12px">✕</button>
      `;
      piezasDiv.appendChild(pRow);
    });

    const addPiezaBtn = document.createElement('button');
    addPiezaBtn.className = 'add-row-btn';
    addPiezaBtn.style = 'margin-top:4px;font-size:10px';
    addPiezaBtn.textContent = '+ Agregar pieza';
    addPiezaBtn.onclick = () => addPieza(idx, mi);
    piezasDiv.appendChild(addPiezaBtn);
    wrap.appendChild(piezasDiv);
    container.appendChild(wrap);
  });
}

function togglePiezas(idx, mi) {
  const d = document.getElementById('piezas-' + idx + '-' + mi);
  if (d) d.style.display = d.style.display === 'none' ? 'block' : 'none';
}

function updatePieza(idx, mi, pi, key, val) {
  if (!state[idx].mantenimiento[mi].piezas) state[idx].mantenimiento[mi].piezas = [];
  state[idx].mantenimiento[mi].piezas[pi][key] = val;
}

function addPieza(idx, mi) {
  if (!state[idx].mantenimiento[mi].piezas) state[idx].mantenimiento[mi].piezas = [];
  state[idx].mantenimiento[mi].piezas.push({ nombre: '', estado: 'disponible' });
  renderMaintList(idx, state[idx].mantenimiento);
  // Re-open piezas section
  setTimeout(() => {
    const d = document.getElementById('piezas-' + idx + '-' + mi);
    if (d) d.style.display = 'block';
  }, 50);
}

function removePieza(idx, mi, pi) {
  state[idx].mantenimiento[mi].piezas.splice(pi, 1);
  renderMaintList(idx, state[idx].mantenimiento);
}

function resolverTarea(idx, mi) {
  const today = new Date().toLocaleDateString('es-PA', {day:'2-digit',month:'2-digit',year:'numeric'});
  state[idx].mantenimiento[mi].resuelto = true;
  state[idx].mantenimiento[mi].fecha_resuelto = today;
  savePanel(idx);
  renderMaintList(idx, state[idx].mantenimiento);
  renderBitacora(idx, state[idx].mantenimiento);
}

function renderBitacora(idx, items) {
  const container = document.getElementById('bitacora-list-' + idx);
  if (!container) return;
  const resueltos = (items || []).filter(m => m.resuelto && m.nombre);
  if (!resueltos.length) {
    container.innerHTML = `<div style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--muted);text-align:center;padding:8px 0">Sin registros</div>`;
    return;
  }
  // Need original indices for delete
  const allItems = items || [];
  container.innerHTML = allItems.map((m, origIdx) => {
    if (!m.resuelto || !m.nombre) return '';
    const piezas = Array.isArray(m.piezas) ? m.piezas.filter(p => p.nombre) : [];
    const diasTotal = m.fecha && m.fecha_resuelto ? (() => {
      const ini = new Date(m.fecha);
      const fin = new Date(m.fecha_resuelto.split('/').reverse().join('-'));
      return isNaN(ini) || isNaN(fin) ? '—' : Math.round((fin-ini)/86400000) + 'd';
    })() : '—';
    return `<div style="padding:8px 12px;border-bottom:1px solid var(--border);background:rgba(0,119,68,0.03)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <span style="font-family:'IBM Plex Sans',sans-serif;font-size:11px;font-weight:700;color:var(--text)">${m.nombre}</span>
        <div style="display:flex;gap:8px;align-items:center">
          <span style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--muted)">Inicio: ${m.fecha||'—'}</span>
          <span style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--muted)">Duración: ${diasTotal}</span>
          <span style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--ok);font-weight:700">✓ ${m.fecha_resuelto||'—'}</span>
          <button onclick="eliminarBitacora(${idx},${origIdx})" style="background:transparent;border:none;color:var(--danger);cursor:pointer;font-size:14px;padding:0 4px" title="Eliminar registro">✕</button>
        </div>
      </div>
      ${piezas.length ? `<div style="font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--muted);margin-top:2px">
        Piezas: ${piezas.map(p => `<span style="margin-right:8px">${p.nombre} (${p.estado||'disponible'})</span>`).join('')}
      </div>` : ''}
    </div>`;
  }).join('');
  if (!container.innerHTML.trim()) container.innerHTML = '<div style="font-family:IBM Plex Mono,monospace;font-size:9px;color:var(--muted);text-align:center;padding:8px 0">Sin registros</div>';
}

function eliminarBitacora(idx, mi) {
  state[idx].mantenimiento.splice(mi, 1);
  savePanel(idx);
  renderBitacora(idx, state[idx].mantenimiento);
}

function docStatusBadge(vence) {
  if (!vence) return '<span style="font-family:IBM Plex Mono,monospace;font-size:9px;color:var(--muted)">—</span>';
  const days = daysUntil(vence);
  if (days === null) return `<span style="display:inline-flex;align-items:center;justify-content:flex-end;min-width:110px;gap:5px;font-family:IBM Plex Mono,monospace;font-size:9px;font-weight:700;color:var(--muted)">—</span>`;
  if (days < 0) return `<span style="display:inline-flex;align-items:center;justify-content:flex-end;min-width:110px;gap:5px;font-family:IBM Plex Mono,monospace;font-size:9px;font-weight:700;color:var(--danger)"><span style="width:8px;height:8px;border-radius:50%;background:var(--danger);display:inline-block"></span>VENCIDO</span>`;
  if (days <= 30) return `<span style="display:inline-flex;align-items:center;justify-content:flex-end;min-width:110px;gap:5px;font-family:IBM Plex Mono,monospace;font-size:9px;font-weight:700;color:var(--warn)"><span style="width:8px;height:8px;border-radius:50%;background:var(--warn);display:inline-block"></span>POR VENCER (${days}d)</span>`;
  return `<span style="display:inline-flex;align-items:center;justify-content:flex-end;min-width:110px;gap:5px;font-family:IBM Plex Mono,monospace;font-size:9px;font-weight:700;color:var(--ok)"><span style="width:8px;height:8px;border-radius:50%;background:var(--ok);display:inline-block"></span>VIGENTE</span>`;
}

function renderDocList(idx, items) {
  const container = document.getElementById('doc-list-' + idx);
  container.innerHTML = '';
  items.forEach((d, di) => {
    const row = document.createElement('div');
    row.className = 'doc-row';
    row.innerHTML = `
      <input type="text" class="doc-name-input" value="${d.nombre}" placeholder="Nombre del documento" onchange="updateDoc(${idx},${di},'nombre',this.value)">
      <input type="date" class="doc-date-input" value="${d.vence}" onchange="updateDoc(${idx},${di},'vence',this.value);this.closest('.doc-row').querySelector('.doc-status-badge').innerHTML=docStatusBadge(this.value)">
      <span class="doc-status-badge">${docStatusBadge(d.vence)}</span>
    `;
    container.appendChild(row);
  });
}

// Preset statuses
const presetStatus = {
  "HP-1819BL":  "operativo",
  "HP-1907BL":  "mantenimiento",
  "HP-1784BL":  "aog",
  "HP-1815BL":  "operativo",
  "HP-1579BL":  "mantenimiento",
  "HP-1930BL":  "operativo",
  "HP-880BL":   "mantenimiento",
  "HP-18BLM":   "operativo",
  "HP-11BL":    "operativo",
  "HP-1805BLM": "aog",
};

// Preset data per aircraft
const presetData = {
  "HP-1819BL": { ciclos_totales: "500", ciclos_limite: "1150" },
};

// State - initialized with presets, then overwritten by Firebase data
const state = fleet.map((ac, idx) => {
  const base = defaultAc(ac);
  if (presetStatus[ac.reg]) base.status = presetStatus[ac.reg];
  if (presetData[ac.reg]) Object.assign(base, presetData[ac.reg]);
  return base;
});

function updateMaint(idx, mi, key, val) {
  state[idx].mantenimiento[mi][key] = val;
}
function updateMaintDate(idx, mi, val) {
  state[idx].mantenimiento[mi].fecha = val;
  document.getElementById(`days-badge-${idx}-${mi}`).innerHTML = daysBadge(daysUntil(val));
}
function updateDoc(idx, di, key, val) {
  state[idx].documentos[di][key] = val;
}

function addMaintRow(idx) {
  state[idx].mantenimiento.push({ nombre: '', fecha: '', resuelto: false, piezas: [] });
  renderMaintList(idx, state[idx].mantenimiento);
}
function addDocRow(idx) {
  state[idx].documentos.push({ nombre: '', vence: '', estado: '' });
  renderDocList(idx, state[idx].documentos);
}

function toggleEmerg(idx) {
  const body = document.getElementById('emerg-body-' + idx);
  const arrow = document.getElementById('emerg-arrow-' + idx);
  const visible = body.style.display !== 'none';
  body.style.display = visible ? 'none' : 'block';
  arrow.textContent = visible ? '▸' : '▾';
}

function getHoraPanama() {
  return new Date().toLocaleTimeString('es-PA', {hour:'2-digit',minute:'2-digit',timeZone:'America/Panama',hour12:false});
}
function getFechaPanama() {
  return new Date().toLocaleDateString('es-PA', {day:'2-digit',month:'2-digit',year:'numeric',timeZone:'America/Panama'});
}

function renderBitacoraHoras(idx, items) {
  const container = document.getElementById('bitacora-horas-' + idx);
  if (!container) return;
  const registros = Array.isArray(items) ? items : [];
  if (!registros.length) {
    container.innerHTML = '<div style="font-family:IBM Plex Mono,monospace;font-size:9px;color:var(--muted);text-align:center;padding:8px 0">Sin registros</div>';
    return;
  }
  // Show most recent first
  const lastIdx = registros.length - 1;
  container.innerHTML = [...registros].reverse().map((r, ri) => {
    const origIdx = registros.length - 1 - ri;
    const isLast = origIdx === lastIdx;
    return `<div style="display:grid;grid-template-columns:1fr 1fr 80px 80px 30px;gap:6px;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)${isLast?';background:rgba(0,102,204,0.04)':''}">
      <span style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text)">${r.fecha||'—'}</span>
      <span style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--muted)">${r.hora||'—'}</span>
      <span style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--accent);font-weight:700">${parseFloat(r.hv||0).toFixed(1)}</span>
      <span style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text)">${parseFloat(r.acum||0).toFixed(1)}</span>
      ${isLast ? `<button onclick="eliminarHoraBitacora(${idx},${origIdx})" style="background:transparent;border:none;color:var(--danger);cursor:pointer;font-size:12px;padding:0" title="Eliminar último registro">✕</button>` : '<span></span>'}
    </div>`;
  }).join('');
}

function eliminarHoraBitacora(idx, ri) {
  const d = state[idx];
  if (!d.bitacora_horas || !d.bitacora_horas[ri]) return;
  const hv = parseFloat(d.bitacora_horas[ri].hv || 0);
  // Subtract from accumulators
  d.horas_acum_50 = Math.max(0, parseFloat(d.horas_acum_50||0) - hv).toFixed(1);
  d.horas_acum_100 = Math.max(0, parseFloat(d.horas_acum_100||0) - hv).toFixed(1);
  d.bitacora_horas.splice(ri, 1);
  // Update display
  const a50 = document.getElementById('acum50-' + idx);
  const a100 = document.getElementById('acum100-' + idx);
  if (a50) a50.textContent = parseFloat(d.horas_acum_50).toFixed(1) + ' HV';
  if (a100) a100.textContent = parseFloat(d.horas_acum_100).toFixed(1) + ' HV';
  const pb50 = document.getElementById('pb-50-' + idx);
  const pb100 = document.getElementById('pb-100-' + idx);
  if (pb50) pb50.style.width = Math.min(100, parseFloat(d.horas_acum_50)/50*100) + '%';
  if (pb100) pb100.style.width = Math.min(100, parseFloat(d.horas_acum_100)/100*100) + '%';
  renderBitacoraHoras(idx, d.bitacora_horas);
  savePanel(idx);
}

function revertirVenc(idx) {
  const d = state[idx];
  if (!d.ultimo_venc_hv) return;
  const hv = parseFloat(d.ultimo_venc_hv);
  d.ciclos_totales = Math.max(0, parseFloat(d.ciclos_totales||0) - hv).toFixed(1);
  d.ciclos_limite  = Math.max(0, parseFloat(d.ciclos_limite||0)  - hv).toFixed(1);
  d.ultimo_venc_hv = '';
  d.ultimo_venc_fecha = '';
  // Update display
  const amot = document.getElementById('acum-motor-' + idx);
  const ahel = document.getElementById('acum-helices-' + idx);
  if (amot) amot.innerHTML = parseFloat(d.ciclos_totales).toFixed(1) + ' <span style="font-size:9px;color:var(--accent)">/ 2000 HV</span>';
  if (ahel) ahel.innerHTML = parseFloat(d.ciclos_limite).toFixed(1) + ' <span style="font-size:9px;color:var(--accent)">/ 2000 HV</span>';
  updateVencBar('motor', idx, d.ciclos_totales, 2000);
  updateVencBar('helices', idx, d.ciclos_limite, 2000);
  const ulDiv = document.getElementById('ultimo-venc-' + idx);
  if (ulDiv) ulDiv.style.display = 'none';
  const ht = document.getElementById('ciclos_totales-' + idx);
  const hl = document.getElementById('ciclos_limite-' + idx);
  if (ht) ht.value = d.ciclos_totales;
  if (hl) hl.value = d.ciclos_limite;
  savePanel(idx);
}

function getVal(id) { const el = document.getElementById(id); return el ? el.value : ''; }

function savePanel(idx) {
  console.log('savePanel called for idx:', idx, 'reg:', fleet[idx].reg);
  const d = state[idx];
  const ac = fleet[idx];
  d.status        = getVal('status-' + idx);
  d.serial        = getVal('serial-' + idx);
  d.year          = getVal('year-' + idx);
  d.voltaje       = getVal('voltaje-' + idx);
  d.motor_modelo  = getVal('motor_modelo-' + idx);
  d.motor_serie   = getVal('motor_serie-' + idx);
  d.helice_modelo = getVal('helice_modelo-' + idx);
  d.helice_serie  = getVal('helice_serie-' + idx);
  // Daily hours accumulation
  const hvDiariasRaw = parseFloat(getVal('horas_diarias-' + idx) || 0);
  if (hvDiariasRaw > 0) {
    const fecha = getFechaPanama();
    const hora = getHoraPanama();
    d.horas_acum_50 = (parseFloat(d.horas_acum_50 || 0) + hvDiariasRaw).toFixed(1);
    d.horas_acum_100 = (parseFloat(d.horas_acum_100 || 0) + hvDiariasRaw).toFixed(1);
    d.fecha_diaria = fecha + ' ' + hora;
    if (!Array.isArray(d.bitacora_horas)) d.bitacora_horas = [];
    d.bitacora_horas.push({ fecha, hora, hv: hvDiariasRaw.toFixed(1), acum: d.horas_acum_100 });
    d.horas_diarias = '';
    // Update display immediately
    const inp = document.getElementById('horas_diarias-' + idx);
    if (inp) inp.value = '';
    const fd = document.getElementById('fecha-diaria-' + idx);
    if (fd) fd.textContent = d.fecha_diaria;
    const a50 = document.getElementById('acum50-' + idx);
    const a100 = document.getElementById('acum100-' + idx);
    if (a50) a50.textContent = parseFloat(d.horas_acum_50).toFixed(1) + ' HV';
    if (a100) a100.textContent = parseFloat(d.horas_acum_100).toFixed(1) + ' HV';
    const pb50 = document.getElementById('pb-50-' + idx);
    const pb100 = document.getElementById('pb-100-' + idx);
    if (pb50) { pb50.style.width = Math.min(100, parseFloat(d.horas_acum_50)/50*100) + '%'; pb50.className = 'progress-fill ' + (parseFloat(d.horas_acum_50)/50*100>=80?'fill-danger':'fill-ok'); }
    if (pb100) { pb100.style.width = Math.min(100, parseFloat(d.horas_acum_100)/100*100) + '%'; pb100.className = 'progress-fill ' + (parseFloat(d.horas_acum_100)/100*100>=80?'fill-danger':'fill-ok'); }
    renderBitacoraHoras(idx, d.bitacora_horas);
  }
  d.horas_totales = d.horas_acum_50 || '';
  d.horas_limite  = d.horas_acum_100 || '';
  d.fecha_50      = state[idx].fecha_50 || d.fecha_50 || '';
  d.fecha_100     = state[idx].fecha_100 || d.fecha_100 || '';
  // Daily hours for motor+helices
  const hvVencDia = parseFloat(document.getElementById('horas-venc-dia-' + idx)?.value || 0);
  if (hvVencDia > 0) {
    const fechaV = getFechaPanama();
    d.ciclos_totales = (parseFloat(d.ciclos_totales || 0) + hvVencDia).toFixed(1);
    d.ciclos_limite  = (parseFloat(d.ciclos_limite  || 0) + hvVencDia).toFixed(1);
    const horaV = getHoraPanama();
    d.fecha_motor    = fechaV + ' ' + horaV;
    d.fecha_helices  = fechaV + ' ' + horaV;
    // Update display
    const amot = document.getElementById('acum-motor-' + idx);
    const ahel = document.getElementById('acum-helices-' + idx);
    if (amot) amot.innerHTML = parseFloat(d.ciclos_totales).toFixed(1) + ' <span style="font-size:9px;color:var(--accent)">/ 2000 HV</span>';
    if (ahel) ahel.innerHTML = parseFloat(d.ciclos_limite).toFixed(1) + ' <span style="font-size:9px;color:var(--accent)">/ 2000 HV</span>';
    updateVencBar('motor', idx, d.ciclos_totales, 2000);
    updateVencBar('helices', idx, d.ciclos_limite, 2000);
    const fmEl = document.getElementById('fecha-motor-' + idx);
    const fhEl = document.getElementById('fecha-helices-' + idx);
    if (fmEl) fmEl.textContent = fechaV;
    if (fhEl) fhEl.textContent = fechaV;
    // Save ultimo registro
    d.ultimo_venc_hv = hvVencDia.toFixed(1);
    d.ultimo_venc_fecha = fechaV + ' ' + horaV;
    const ulDiv = document.getElementById('ultimo-venc-' + idx);
    if (ulDiv) {
      ulDiv.style.display = 'flex';
      ulDiv.querySelector('span:nth-child(2)').textContent = hvVencDia.toFixed(1) + ' HV';
      ulDiv.querySelector('span:nth-child(3)').textContent = d.ultimo_venc_fecha;
    }
    // Clear input
    const vencInp = document.getElementById('horas-venc-dia-' + idx);
    if (vencInp) vencInp.value = '';
    // Update hidden fields
    const ht = document.getElementById('ciclos_totales-' + idx);
    const hl = document.getElementById('ciclos_limite-' + idx);
    if (ht) ht.value = d.ciclos_totales;
    if (hl) hl.value = d.ciclos_limite;
  }
  d.horas_desde_revision = getVal('horas_desde-' + idx);
  d.horas_hasta_revision = getVal('horas_hasta-' + idx);
  d.fecha_motor  = state[idx].fecha_motor  || d.fecha_motor  || '';
  d.fecha_helices = state[idx].fecha_helices || d.fecha_helices || '';
  d.emerg_salvavidas = getVal('emerg-salvavidas-' + idx);
  d.emerg_extintor   = getVal('emerg-extintor-' + idx);
  d.emerg_flares     = getVal('emerg-flares-' + idx);
  d.emerg_botiquin   = getVal('emerg-botiquin-' + idx);

  // Update progress bars
  const hp = pct(d.horas_totales, d.horas_limite);
  const pb_h = document.getElementById('pb-horas-' + idx);
  pb_h.style.width = (hp || 0) + '%';
  pb_h.className = 'progress-fill ' + fillCls(hp);
  document.getElementById('pct-horas-' + idx).textContent = hp !== null ? hp + '% del límite' : '—';

  const cp = pct(d.ciclos_totales, d.ciclos_limite);
  const pb_c = document.getElementById('pb-ciclos-' + idx);
  pb_c.style.width = (cp || 0) + '%';
  pb_c.className = 'progress-fill ' + fillCls(cp);
  document.getElementById('pct-ciclos-' + idx).textContent = cp !== null ? cp + '% del límite' : '—';

  // Update gauge
  const gc = gaugeColor(d.horas_desde_revision, d.horas_hasta_revision);
  const gw = document.getElementById('gauge-wrap-' + idx); if (gw) gw.innerHTML = buildGauge(d.horas_desde_revision, d.horas_hasta_revision, gc);
  const gaugeVal = document.getElementById('gauge-val-' + idx);
  if (gaugeVal) {
    gaugeVal.textContent = d.horas_desde_revision && d.horas_hasta_revision
      ? d.horas_desde_revision + ' / ' + d.horas_hasta_revision + ' HV' : '— / — HV';
    gaugeVal.style.color = gc;
  }

  // Update sidebar badge
  const badge = document.querySelector(`#sidebar-tabs .aircraft-tab[data-idx="${idx}"] .tab-badge`);
  if (badge) {
    badge.className = 'tab-badge ' + (d.status === 'operativo' ? 'badge-ok' : d.status === 'mantenimiento' ? 'badge-warn' : d.status === 'aog' ? 'badge-danger' : 'badge-empty');
  }

  // Clean data before saving - remove undefined/null/circular values
  // Convert arrays to Firebase-compatible objects
  const cleanData = {};
  Object.keys(d).forEach(key => {
    const val = d[key];
    if (typeof val === 'function') return;
    if (Array.isArray(val)) {
      const obj = {};
      val.forEach((item, i) => {
        obj['i' + i] = {};
        Object.keys(item).forEach(k => { obj['i' + i][k] = item[k] || ''; });
      });
      cleanData[key] = obj;
    } else {
      cleanData[key] = val === undefined || val === null ? '' : val;
    }
  });
  console.log('Saving:', ac.reg, JSON.stringify(cleanData).slice(0,80));
  const ok = saveData(ac.reg, cleanData);
  updateSummary();

  const msg = document.getElementById('save-msg-' + idx);
  if (msg) {
    msg.textContent = ok ? '✓ Guardado' : '✗ Error al guardar';
    msg.style.color = ok ? 'var(--ok)' : 'var(--danger)';
    msg.style.opacity = '1';
    setTimeout(() => msg.style.opacity = '0', 2500);
  }
}

function buildResumen() {
  const DAYS_WARN = 30;
  const container = document.getElementById('resumen-content');
  let sections = {};

  // Helper to add alert
  function addAlert(category, reg, item, detail, type) {
    if (!sections[category]) sections[category] = [];
    sections[category].push({ reg, item, detail, type });
  }

  // Check each aircraft
  state.forEach((d, idx) => {
    const reg = fleet[idx].reg;

    // Documents & Certificaciones
    if (d.documentos) {
      d.documentos.forEach(doc => {
        if (!doc.nombre || !doc.vence) return;
        const days = daysUntil(doc.vence);
        if (days !== null && days <= DAYS_WARN) {
          addAlert('📋 Documentos & Certificaciones', reg, doc.nombre, days < 0 ? 'VENCIDO' : `Vence en ${days} días`, days < 0 ? 'danger' : 'warn');
        }
      });
    }

    // Equipos de emergencia
    const emergs = { 'Salvavidas': d.emerg_salvavidas, 'Extintor': d.emerg_extintor, 'Flares': d.emerg_flares, 'Botiquín': d.emerg_botiquin };
    Object.entries(emergs).forEach(([name, fecha]) => {
      if (!fecha) return;
      const days = daysUntil(fecha);
      if (days !== null && days <= DAYS_WARN) {
        addAlert('🚨 Equipos de Emergencia', reg, name, days < 0 ? 'VENCIDO' : `Vence en ${days} días`, days < 0 ? 'danger' : 'warn');
      }
    });

    // Motor (horas) - warn when <= 20% remaining (>= 80% used of 2000)
    if (d.ciclos_totales) {
      const pctUsed = parseFloat(d.ciclos_totales) / 2000 * 100;
      if (pctUsed >= 80) {
        const rem = 2000 - parseFloat(d.ciclos_totales);
        addAlert('⚙️ Vencimientos en Horas', reg, 'Motor', `Quedan ${rem} HV (${Math.round(100-pctUsed)}%)`, 'danger');
      }
    }

    // Helices (horas)
    if (d.ciclos_limite) {
      const pctUsed = parseFloat(d.ciclos_limite) / 2000 * 100;
      if (pctUsed >= 80) {
        const rem = 2000 - parseFloat(d.ciclos_limite);
        addAlert('⚙️ Vencimientos en Horas', reg, 'Hélices', `Quedan ${rem} HV (${Math.round(100-pctUsed)}%)`, 'danger');
      }
    }

    // Inspecciones 50/100 hrs — solo alerta la más alta que aplique
    const acum50 = parseFloat(d.horas_acum_50 || d.horas_totales || 0);
    const acum100 = parseFloat(d.horas_acum_100 || d.horas_limite || 0);
    const pct100 = acum100 / 100 * 100;
    const pct50 = acum50 / 50 * 100;

    if (pct100 >= 80) {
      // 100 hrs alert takes priority — don't show 50 hrs
      const rem = (100 - acum100).toFixed(1);
      addAlert('✈ Inspecciones', reg, 'Insp. 100 hrs', `Quedan ${rem} HV (${Math.round(100-pct100)}%)`, 'danger');
    } else if (pct50 >= 80) {
      // Only show 50 hrs alert if 100 hrs is not alerting
      const rem = (50 - acum50).toFixed(1);
      addAlert('✈ Inspecciones', reg, 'Insp. 50 hrs', `Quedan ${rem} HV (${Math.round(100-pct50)}%)`, 'danger');
    }
  });

  // Check pilotos
  pilotosData.forEach(p => {
    if (!p.nombre) return;
    if (p.licencia) {
      const days = daysUntil(p.licencia);
      if (days !== null && days <= DAYS_WARN) {
        addAlert('👨‍✈️ Vigencia Pilotos', p.nombre, 'Licencia', days < 0 ? 'VENCIDA' : `Vence en ${days} días`, days < 0 ? 'danger' : 'warn');
      }
    }
    if (p.medico) {
      const days = daysUntil(p.medico);
      if (days !== null && days <= DAYS_WARN) {
        addAlert('👨‍✈️ Vigencia Pilotos', p.nombre, 'Cert. Médico', days < 0 ? 'VENCIDO' : `Vence en ${days} días`, days < 0 ? 'danger' : 'warn');
      }
    }
  });

  // Render - grouped by aircraft registration
  if (Object.keys(sections).length === 0) {
    container.innerHTML = `<div style="text-align:center;padding:40px 0;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ok)">✅ Todo en orden — sin tareas pendientes</div>`;
    return;
  }

  // Regroup by aircraft registration — pilotos go under one group
  const byReg = {};
  Object.entries(sections).forEach(([cat, items]) => {
    items.forEach(item => {
      const isPiloto = cat.includes('Pilotos');
      const key = isPiloto ? '👨‍✈️ VIGENCIA PILOTOS' : item.reg;
      if (!byReg[key]) byReg[key] = [];
      byReg[key].push({...item, cat});
    });
  });

  // Sort regs — fleet order first, then pilotos group last
  const regOrder = fleet.map(a => a.reg);
  const sortedRegs = Object.keys(byReg).sort((a,b) => {
    if (a.includes('VIGENCIA')) return 1;
    if (b.includes('VIGENCIA')) return -1;
    const ia = regOrder.indexOf(a), ib = regOrder.indexOf(b);
    if (ia === -1 && ib === -1) return a.localeCompare(b);
    if (ia === -1) return 1;
    if (ib === -1) return -1;
    return ia - ib;
  });

  // Build two-column grid layout
  let html = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start">';
  sortedRegs.forEach(reg => {
    const items = byReg[reg];
    const total = items.length;
    const isPilotoGroup = reg.includes('VIGENCIA');
    const regLabel = isPilotoGroup
      ? `<span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--accent2)">${reg}</span>`
      : `<span style="font-family:'Orbitron',sans-serif;font-size:11px;color:var(--accent)">${reg}</span>`;
    html += `<div style="margin-bottom:4px">
      <div class="divider-label" style="margin-bottom:8px">
        ${regLabel}
        <span style="font-family:'IBM Plex Mono',monospace;font-size:8px;background:rgba(204,17,34,0.1);color:var(--danger);padding:2px 6px;border-radius:2px">${total} pendiente${total>1?'s':''}</span>
      </div>
      <div class="card" style="padding:0">`;

    items.forEach((item, ii) => {
      const color = item.type === 'danger' ? 'var(--danger)' : 'var(--warn)';
      const bg = item.type === 'danger' ? 'rgba(204,17,34,0.05)' : 'rgba(204,119,0,0.05)';
      const isHoras = item.cat.includes('Horas') || item.cat.includes('Inspecciones');
      const isDoc = item.cat.includes('Documentos') || item.cat.includes('Emergencia');
      const isPiloto = item.cat.includes('Pilotos');

      const itemId = `pend-${reg.replace(/[^a-zA-Z0-9]/g,'_')}-${ii}`;

      let resolveHtml = '';
      if (isHoras) {
        resolveHtml = `<button onclick="resolverHoras('${reg}','${item.item}')" 
          style="font-family:'IBM Plex Mono',monospace;font-size:9px;background:rgba(0,119,68,0.1);color:var(--ok);border:1px solid var(--ok);border-radius:2px;padding:3px 10px;cursor:pointer">
          ✓ Resuelto</button>`;
      } else if (isDoc || isPiloto) {
        resolveHtml = `<div style="display:flex;align-items:center;gap:6px">
          <input type="date" id="${itemId}-fecha" style="font-size:10px;padding:2px 6px;border:1px solid var(--border);border-radius:2px;background:var(--panel2);color:var(--text)">
          <button onclick="resolverDoc('${reg}','${item.item}','${item.cat}',document.getElementById('${itemId}-fecha').value)"
            style="font-family:'IBM Plex Mono',monospace;font-size:9px;background:rgba(0,119,68,0.1);color:var(--ok);border:1px solid var(--ok);border-radius:2px;padding:3px 10px;cursor:pointer">
            ✓ Actualizar</button>
        </div>`;
      }

      const rowLabel = isPilotoGroup
        ? `<div style="font-family:'IBM Plex Sans',sans-serif;font-size:11px;font-weight:700;color:var(--text)">${item.reg}</div>
           <div style="font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--muted);margin-top:2px">${item.item}</div>`
        : `<div style="font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--muted)">${item.cat}</div>
           <div style="font-family:'IBM Plex Sans',sans-serif;font-size:11px;font-weight:700;color:var(--text);margin-top:2px">${item.item}</div>`;
      html += `<div style="display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;padding:7px 12px;border-bottom:1px solid var(--border);background:${bg}">
        <div>${rowLabel}</div>
        <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:${color};font-weight:700">${item.detail}</span>
        ${resolveHtml}
      </div>`;
    });
    html += `</div></div>`;
  });
  html += '</div>';
  container.innerHTML = html;
}

// Resolver horas — pone en 0 y guarda
function resolverHoras(reg, item) {
  const idx = fleet.findIndex(a => a.reg === reg);
  if (idx === -1) return;
  const d = state[idx];

  if (item.includes('Motor')) { 
    d.ciclos_totales = '0'; 
    const el = document.getElementById('ciclos_totales-'+idx); 
    if(el) { el.value='0'; updateVencBar('motor',idx,'0',2000); updateHorasWarning(el,2000); }
  }
  if (item.includes('Hélices')) { 
    d.ciclos_limite = '0'; 
    const el = document.getElementById('ciclos_limite-'+idx); 
    if(el) { el.value='0'; updateVencBar('helices',idx,'0',2000); updateHorasWarning(el,2000); }
  }
  if (item.includes('50 hrs')) { 
    // Reset only 50 hrs accumulator
    d.horas_acum_50 = '0';
    d.horas_totales = '0';
    const a50 = document.getElementById('acum50-'+idx);
    const pb50 = document.getElementById('pb-50-'+idx);
    if(a50) a50.textContent = '0.0 HV';
    if(pb50) { pb50.style.width='0%'; pb50.className='progress-fill fill-ok'; }
  }
  if (item.includes('100 hrs')) { 
    // Reset both 50 and 100 accumulators
    d.horas_acum_50 = '0';
    d.horas_totales = '0';
    d.horas_acum_100 = '0';
    d.horas_limite = '0';
    const a50 = document.getElementById('acum50-'+idx);
    const pb50 = document.getElementById('pb-50-'+idx);
    const a100 = document.getElementById('acum100-'+idx);
    const pb100 = document.getElementById('pb-100-'+idx);
    if(a50) a50.textContent = '0.0 HV';
    if(pb50) { pb50.style.width='0%'; pb50.className='progress-fill fill-ok'; }
    if(a100) a100.textContent = '0.0 HV';
    if(pb100) { pb100.style.width='0%'; pb100.className='progress-fill fill-ok'; }
  }

  savePanel(idx);
  setTimeout(() => buildResumen(), 500);
}

// Resolver doc — actualiza fecha y guarda
function resolverDoc(reg, item, cat, newDate) {
  if (!newDate) { alert('Por favor ingresa la nueva fecha de vencimiento.'); return; }
  const idx = fleet.findIndex(a => a.reg === reg);

  if (idx !== -1) {
    const d = state[idx];
    // Match document name
    if (cat.includes('Emergencia')) {
      if (item.includes('Salvavidas')) d.emerg_salvavidas = newDate;
      else if (item.includes('Extintor')) d.emerg_extintor = newDate;
      else if (item.includes('Flares')) d.emerg_flares = newDate;
      else if (item.includes('Botiquín')) d.emerg_botiquin = newDate;
      // Update field in panel
      const emerMap = {'Salvavidas':'salvavidas','Extintor':'extintor','Flares':'flares','Botiquín':'botiquin'};
      Object.entries(emerMap).forEach(([k,v]) => {
        if(item.includes(k)) { const el=document.getElementById('emerg-'+v+'-'+idx); if(el) el.value=newDate; }
      });
    } else {
      // Update in documentos array
      d.documentos.forEach(doc => {
        if (doc.nombre && doc.nombre.toLowerCase().includes(item.toLowerCase())) {
          doc.vence = newDate;
        }
      });
      renderDocList(idx, d.documentos);
    }
    savePanel(idx);
  } else {
    // Piloto
    pilotosData.forEach(p => {
      if (p.nombre === reg) {
        if (item === 'Licencia') p.licencia = newDate;
        if (item === 'Cert. Médico') p.medico = newDate;
      }
    });
    savePilotos();
    renderPilotos();
  }
  setTimeout(() => buildResumen(), 500);
}

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('es-PA', { hour12: false });
  document.getElementById('dateStr').textContent = now.toLocaleDateString('es-PA', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' }).toUpperCase();
}
updateClock(); setInterval(updateClock, 1000);

// Refresh a single aircraft panel from state
function refreshPanel(idx) {
  const d = state[idx];
  const g = id => document.getElementById(id + idx);
  const sv = (id, val) => { const el = g(id); if (el) el.value = val || ''; };
  const st = (id, val) => { const el = g(id); if (el) el.textContent = val || '—'; };

  sv('status-', d.status);
  sv('serial-', d.serial);
  sv('year-', d.year);
  sv('voltaje-', d.voltaje);
  sv('motor_modelo-', d.motor_modelo);
  sv('motor_serie-', d.motor_serie);
  sv('helice_modelo-', d.helice_modelo);
  sv('helice_serie-', d.helice_serie);
  sv('horas_diarias-', '');
  // Update accumulators display
  const a50 = document.getElementById('acum50-' + idx);
  const a100 = document.getElementById('acum100-' + idx);
  if (a50) a50.textContent = parseFloat(d.horas_acum_50||0).toFixed(1) + ' HV';
  if (a100) a100.textContent = parseFloat(d.horas_acum_100||0).toFixed(1) + ' HV';
  const pb50r = document.getElementById('pb-50-' + idx);
  const pb100r = document.getElementById('pb-100-' + idx);
  if (pb50r) { pb50r.style.width = Math.min(100,parseFloat(d.horas_acum_50||0)/50*100)+'%'; pb50r.className='progress-fill '+(parseFloat(d.horas_acum_50||0)/50*100>=80?'fill-danger':'fill-ok'); }
  if (pb100r) { pb100r.style.width = Math.min(100,parseFloat(d.horas_acum_100||0)/100*100)+'%'; pb100r.className='progress-fill '+(parseFloat(d.horas_acum_100||0)/100*100>=80?'fill-danger':'fill-ok'); }
  const fd = document.getElementById('fecha-diaria-' + idx);
  if (fd && d.fecha_diaria) fd.textContent = d.fecha_diaria;
  renderBitacoraHoras(idx, d.bitacora_horas);
  sv('horas_totales-', d.horas_acum_50);
  sv('horas_limite-', d.horas_limite);
  sv('ciclos_totales-', d.ciclos_totales);
  sv('ciclos_limite-', d.ciclos_limite);
  // Update motor/helices accum display
  const amot = document.getElementById('acum-motor-' + idx);
  const ahel = document.getElementById('acum-helices-' + idx);
  if (amot) amot.innerHTML = parseFloat(d.ciclos_totales||0).toFixed(1) + ' <span style="font-size:9px;color:var(--accent)">/ 2000 HV</span>';
  if (ahel) ahel.innerHTML = parseFloat(d.ciclos_limite||0).toFixed(1) + ' <span style="font-size:9px;color:var(--accent)">/ 2000 HV</span>';
  if (d.ciclos_totales) updateVencBar('motor', idx, d.ciclos_totales, 2000);
  if (d.ciclos_limite) updateVencBar('helices', idx, d.ciclos_limite, 2000);
  const fm = document.getElementById('fecha-motor-' + idx);
  if (fm && d.fecha_motor) fm.textContent = d.fecha_motor;
  const fh = document.getElementById('fecha-helices-' + idx);
  if (fh && d.fecha_helices) fh.textContent = d.fecha_helices;
  // Ultimo venc registro
  const ulDiv = document.getElementById('ultimo-venc-' + idx);
  if (ulDiv && d.ultimo_venc_hv) {
    ulDiv.style.display = 'flex';
    const spans = ulDiv.querySelectorAll('span');
    if (spans[1]) spans[1].textContent = d.ultimo_venc_hv + ' HV';
    if (spans[2]) spans[2].textContent = d.ultimo_venc_fecha || '';
  }
  sv('horas_desde-', d.horas_desde_revision);
  sv('horas_hasta-', d.horas_hasta_revision);
  sv('emerg-salvavidas-', d.emerg_salvavidas);
  sv('emerg-extintor-', d.emerg_extintor);
  sv('emerg-flares-', d.emerg_flares);
  sv('emerg-botiquin-', d.emerg_botiquin);
  // Update emerg badges
  ['salvavidas','extintor','flares','botiquin'].forEach(e => {
    const inp = document.getElementById('emerg-' + e + '-' + idx);
    if (inp) {
      const badge = inp.closest('.emerg-row') ? inp.closest('.emerg-row').querySelector('.emerg-badge') : null;
      if (badge) badge.innerHTML = docStatusBadge(inp.value);
    }
  });
  st('fecha50-', d.fecha_50);
  st('fecha100-', d.fecha_100);

  if (d.horas_totales) updateHorasWarning(g('horas_totales-'), 50);
  if (d.horas_limite) updateHorasWarning(g('horas_limite-'), 100);
  if (d.ciclos_totales) { updateVencBar('motor', idx, d.ciclos_totales, 2000); updateHorasWarning(g('ciclos_totales-'), 2000); }
  if (d.ciclos_limite) { updateVencBar('helices', idx, d.ciclos_limite, 2000); updateHorasWarning(g('ciclos_limite-'), 2000); }

  renderMaintList(idx, d.mantenimiento);
  renderBitacora(idx, d.mantenimiento);
  renderBitacoraHoras(idx, d.bitacora_horas);
  renderDocList(idx, d.documentos);

  // Update sidebar badge
  const tabs = document.querySelectorAll('#sidebar-tabs .aircraft-tab');
  const tab = tabs[idx + 1]; // +1 because resumen tab is first
  if (tab) {
    const badge = tab.querySelector('.tab-badge');
    if (badge) badge.className = 'tab-badge ' + (d.status === 'operativo' ? 'badge-ok' : d.status === 'mantenimiento' ? 'badge-warn' : d.status === 'aog' ? 'badge-danger' : 'badge-empty');
  }
}

// Load all data from Firebase with real-time listener
if (db) {
  db.ref('fleet').on('value', (snapshot) => {
    const firebaseData = snapshot.val() || {};
    fleet.forEach((ac, idx) => {
      const key = ac.reg.replace(/[^a-zA-Z0-9]/g, '_');
      if (firebaseData[key]) {
        const fbData = firebaseData[key];
        // Convert Firebase objects back to arrays
        ['mantenimiento','documentos','bitacora_horas'].forEach(arrKey => {
          if (fbData[arrKey] && typeof fbData[arrKey] === 'object' && !Array.isArray(fbData[arrKey])) {
            fbData[arrKey] = Object.keys(fbData[arrKey]).sort().map(k => fbData[arrKey][k]);
          }
        });
        Object.assign(state[idx], fbData);
        refreshPanel(idx);
      }
    });
    updateSummary();
    buildResumen();
    // Also rebuild resumen if it's currently visible
    const resPanel = document.getElementById('panel-resumen');
    if (resPanel && resPanel.classList.contains('active')) buildResumen();
    console.log('Firebase data loaded/updated');
  });

  db.ref('pilotos').on('value', (snapshot) => {
    const saved = snapshot.val();
    if (saved && Array.isArray(saved)) {
      pilotosData.length = 0;
      saved.forEach(p => pilotosData.push(p));
      renderPilotos();
    }
  });
}
